version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: wic-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Winter2026!}
      MYSQL_DATABASE: winter_is_coming
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    deploy:
      resources:
        limits:
          memory: 512M

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: wic-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M

  # 游戏后端
  game-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    container_name: wic-server
    restart: always
    environment:
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-Winter2026!}
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    deploy:
      resources:
        limits:
          memory: 512M

  # 客户端构建（一次性构建，输出静态文件）
  client-build:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.client
    container_name: wic-client-build
    volumes:
      - client_dist:/dist

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: wic-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - client_dist:/usr/share/nginx/html
    depends_on:
      - game-server
      - client-build
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  mysql_data:
  redis_data:
  client_dist:
